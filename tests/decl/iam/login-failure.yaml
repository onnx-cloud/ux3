name: IAM login failure
macros:
  login:
    - type: event
      machine: login
      name: SUBMIT
  fail:
    - type: event
      machine: login
      name: ERROR
      payload:
        error: 'Invalid credentials'
  retry:
    - type: event
      machine: login
      name: RETRY
steps:
  - type: macro
    name: login
  - type: macro
    name: fail
  - type: fsmState
    machine: login
    equals: error
  - type: macro
    name: retry
  - type: fsmState
    machine: login
    equals: idle
