name: iam
index: view/index.yaml
domain: 'investamerica.money'
site:
  title: "Invest America"
  description: "Your gateway to smart investments."
plugins:
  - name: '@ux3/plugin-tailwind-plus'
    config:
      css: 'https://cdn.tailwindcss.com'
  - name: '@ux3/plugin-charts-js'
  - name: '@ux3/plugin-stripe'
    config:
      apiKey: 'pk_test_12345'
  - name: '@ux3/plugin-store'

runtime:
  bundleKey: "ux3.bundle"      # must match manifest.runtime.bundle
  hydrationFn: "initApp"       # exported from bundle entry
  # initialState: null          # optional initial state variable name
