name: 'Blog'
layout: default
initial: loading
states:
  loading:
    invoke:
      src: loadBlog
    on:
      SUCCESS: loaded
      ERROR: error
  loaded:
    template: 'view/blog/loaded.html'
    on:
      NEXT_PAGE: loading
      PREV_PAGE: loading
      REFRESH: loading
  error:
    template: 'view/blog/error.html'
    on:
      RETRY: loading
