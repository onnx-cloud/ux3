name: 'SignUp'
layout: auth
initial: idle
states:
  idle:
    template: 'view/sign-up/idle.html'
    on:
      SUBMIT: validating
  validating:
    template: 'view/sign-up/validating.html'
    invoke:
      src: validateSignUp
    on:
      VALID: submitting
      INVALID: error
  submitting:
    template: 'view/sign-up/submitting.html'
    invoke:
      src: submitSignUp
    on:
      SUCCESS: success
      ERROR: error
  success:
    template: 'view/sign-up/success.html'
    on: {}
  error:
    template: 'view/sign-up/error.html'
    on:
      RETRY: idle
