name: 'Market'
layout: default
initial: loading
states:
  loading:
    template: 'market/loading.html'
    invoke:
      service: api
      method: fetch
      input: '/asset/eod/TSLA'  # fetch static JSON under public/api/asset/eod/TSLA.json
    on:
      SUCCESS: loaded
      ERROR: error
  loaded:
    template: 'market/loaded.html'
    on:
      REFRESH: loading
  error:
    template: 'market/error.html'
    on:
      RETRY: loading
