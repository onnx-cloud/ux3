name: 'for-you'
layout: default
initial: loading
states:
  loading:
    template: 'view/for-you/loading.html'
    invoke:
      service: api
      method: getForYou
    on:
      SUCCESS: loaded
      ERROR: error
  loaded:
    template: 'view/for-you/loaded.html'
    on:
      REFRESH: loading
  error:
    template: 'view/for-you/error.html'
    on:
      RETRY: loading
