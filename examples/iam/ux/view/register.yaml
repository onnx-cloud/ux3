name: Register
layout: auth

initial: idle

context:
  form:
    email: ''
    password: ''
    confirmPassword: ''
    agreeToTerms: false

  errors: {}
  touched: {}

states:
  idle:
    template: 'view/register/idle.html'
    on:
      SUBMIT: validating

  validating:
    template: 'view/register/validating.html'
    invoke:
      service: auth
      method: validateRegister
      input:
        form: ctx.form
    on:
      SUCCESS: submitting
      ERROR: idle

  submitting:
    template: 'view/register/submitting.html'
    invoke:
      service: auth
      method: register
      input:
        form: ctx.form
    on:
      SUCCESS: success
      ERROR: error

  success:
    template: 'view/register/success.html'
    on:
      NAVIGATE: idle

  error:
    template: 'view/register/error.html'
    on:
      RETRY: idle
