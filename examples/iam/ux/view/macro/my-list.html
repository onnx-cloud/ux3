<ul class="my-list" part="list">
  <!-- The actual items are rendered by the component code using stampSlotTemplate('item', data) -->
  <div id="item-container"></div>
  
  <slot name="empty">
    <li class="my-list__empty">{{i18n.list.EMPTY}}</li>
  </slot>
</ul>

<!-- Hidden slot to hold the consumer-provided item template -->
<div style="display: none;">
  <slot name="item"></slot>
</div>
