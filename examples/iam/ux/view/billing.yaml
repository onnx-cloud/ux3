name: 'billing'
layout: default
initial: loading
states:
  loading:
    template: 'view/billing/loading.html'
    invoke:
      src: loadBilling
    on:
      SUCCESS: viewing
      ERROR: error
  viewing:
    template: 'view/billing/viewing.html'
    on:
      SELECT: viewing
      UPGRADE: upgrading
      MANAGE_PAYMENT: managing_payment
  upgrading:
    template: 'view/billing/upgrading.html'
    on:
      SUCCESS: viewing
      ERROR: viewing
      CANCEL: viewing
  managing_payment:
    template: 'view/billing/managing_payment.html'
    on:
      SAVE.SUCCESS: viewing
      SAVE.ERROR: viewing
      CANCEL: viewing
  error:
    template: 'view/billing/error.html'
    on:
      RETRY: loading
