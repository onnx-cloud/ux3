name: 'News'
layout: default
initial: loading
states:
  loading:
    template: 'news/loading.html'
    invoke:
      service: api
      method: fetch
      input: '/news/today'   # dev server serves public/api/news/today.json
    on:
      SUCCESS: loaded   # service.fetch returns SUCCESS event on success
      ERROR: error
  loaded:
    template: 'news/loaded.html'
    on:
      RETRY: loading
  error:
    template: 'news/error.html'
    on:
      RETRY: loading
