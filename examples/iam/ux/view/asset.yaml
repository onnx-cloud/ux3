name: 'asset'
layout: default
initial: index
guards:
  - hasSymbol:
      where:
      - param: symbol
        operator: exists
states:
  index:
    template: 'view/asset/index.html'
    always:
      - cond: hasSymbol
        target: loading
  loading:
    always:
      - cond: hasSymbol
        target: loading
      - target: index
    invoke:
      service: eod
      method: lookup
    on:
      SUCCESS: loaded
      ERROR: error
  loaded:
    template: 'view/asset/detail.html'
    on:
      REFRESH: loading
  error:
    template: 'view/asset/error.html'
    on:
      RETRY: loading
