<div ux-state="register.success" ux-style="page-auth">
  <div ux-style="card">
    <div ux-style="success-message">
      <div class="icon">✓</div>
      <h1>{{i18n.register.successTitle}}</h1>
      <p>{{i18n.register.successMessage}}</p>
      <button ux-event="NAVIGATE" ux-style="button-primary">
        {{i18n.register.continueButton}}
      </button>
    </div>
  </div>
</div>
