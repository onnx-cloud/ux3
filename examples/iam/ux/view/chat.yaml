name: 'Chat'
layout: default
initial: loading
states:
  loading:
    template: 'view/chat/loading.html'
    invoke:
      src: loadConversations
    on:
      SUCCESS: ready
      ERROR: error
  ready:
    template: 'view/chat/ready.html'
    on:
      SELECT_CONVERSATION: chatting
  chatting:
    template: 'view/chat/chatting.html'
    on:
      SEND_MESSAGE: chatting
      BACK: ready
  error:
    template: 'view/chat/error.html'
    on:
      RETRY: loading
