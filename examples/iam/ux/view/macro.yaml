name: 'Macro'
layout: default
initial: loading
states:
  loading:
    template: 'view/macro/loading.html'
    invoke:
      src: loadMacro
    on:
      SUCCESS: loaded
      ERROR: error
  loaded:
    template: 'view/macro/loaded.html'
    on:
      REFRESH: loading
  error:
    template: 'view/macro/error.html'
    on:
      RETRY: loading
