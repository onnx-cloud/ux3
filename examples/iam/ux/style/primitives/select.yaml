select:
  base: 'w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2'
  variants:
    size:
      sm: 'px-2 py-1 text-sm'
      md: 'px-3 py-2 text-base'
      lg: 'px-4 py-3 text-lg'
    state:
      default: 'border-gray-300'
      error: 'border-red-600'
      disabled: 'opacity-50 cursor-not-allowed bg-gray-100'
  defaults:
    size: md
    state: default
