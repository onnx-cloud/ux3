button:
  base: 'inline-flex items-center justify-center transition-colors duration-200 rounded-md font-medium focus:outline-none focus-visible:ring-2'
  variants:
    variant:
      primary: 'bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500 focus:ring-offset-2'
      secondary: 'bg-gray-200 text-gray-900 hover:bg-gray-300 focus:ring-gray-400'
      danger: 'bg-red-600 text-white hover:bg-red-700 focus:ring-red-500 focus:ring-offset-2'
      ghost: 'hover:bg-gray-100 text-gray-900 focus:ring-gray-400'
    size:
      xs: 'px-2 py-1 text-xs'
      sm: 'px-3 py-1.5 text-sm'
      md: 'px-4 py-2 text-base'
      lg: 'px-6 py-3 text-lg'
      xl: 'px-8 py-4 text-xl'
    disabled:
      true: 'opacity-50 cursor-not-allowed'
      false: 'cursor-pointer'
  defaults:
    variant: primary
    size: md
    disabled: false
