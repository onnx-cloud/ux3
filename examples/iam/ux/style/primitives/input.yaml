input:
  base: 'w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors duration-200'
  variants:
    type:
      text: ''
      email: ''
      password: ''
      number: ''
      date: ''
      tel: ''
      url: ''
    size:
      sm: 'px-2 py-1 text-sm'
      md: 'px-3 py-2 text-base'
      lg: 'px-4 py-3 text-lg'
    state:
      default: 'border-gray-300 focus:border-blue-500 focus:ring-blue-500/20'
      error: 'border-red-600 focus:border-red-600 focus:ring-red-600/20'
      disabled: 'opacity-50 cursor-not-allowed bg-gray-100'
  defaults:
    type: text
    size: md
    state: default
