name: kanban
index: view/home.yaml
site:
  title: "Kanban Board"
  description: "Collaborative kanban board with local storage"
plugins:
  - name: '@ux3/plugin-tailwind-plus'
    config:
      css: 'https://cdn.tailwindcss.com'
  - name: '@ux3/plugin-store'

development:
  hot-reload: true
  logging: debug
  inspector: true

runtime:
  bundleKey: "ux3.bundle"
  hydrationFn: "initApp"
