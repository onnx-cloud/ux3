container:
  base: 'container mx-auto p-4'

project-header:
  base: 'flex justify-between items-center mb-4'

search-bar:
  base: 'mb-4'

search-input:
  base: 'w-full border rounded p-2'

empty-state:
  base: 'text-center text-gray-500'

project-grid:
  base: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4'

btn-primary:
  base: 'px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700'

btn-secondary:
  base: 'px-4 py-2 bg-gray-300 rounded hover:bg-gray-400'

board-header:
  base: 'flex justify-between items-center mb-4'

btn-add:
  base: 'px-3 py-1 bg-green-600 text-white rounded hover:bg-green-700'

filter-bar:
  base: 'flex gap-2 mb-4'

filter-select:
  base: 'border rounded p-1'

task-form:
  base: 'space-y-4'

alert-error:
  base: 'text-red-600'

form-label:
  base: 'block'

form-input:
  base: 'w-full border rounded p-2'

form-button-group:
  base: 'flex gap-2'

header-app:
  base: 'bg-white shadow mb-4'

nav-container:
  base: 'container mx-auto p-4 flex justify-between items-center'

loading:
  base: 'text-center p-4 text-gray-500'

btn-icon:
  base: 'text-2xl'

header-title:
  base: 'text-2xl font-semibold'

kanban-grid:
  base: 'grid grid-cols-[repeat(auto-fit,minmax(300px,1fr))] gap-4 p-4 overflow-x-auto'

form-space:
  base: 'space-y-4'

button-group:
  base: 'flex gap-2'

# additional semantic styles migrated from kanban.css
lane:
  base: 'bg-gray-100 rounded-lg p-2 min-h-[500px] flex flex-col'

lane-header:
  base: 'flex items-center gap-2 p-2 font-semibold border-b-2 border-gray-200'

lane-tasks:
  base: 'flex-1 overflow-y-auto flex flex-col gap-2 p-2 min-h-[100px]'

task-card:
  base: 'bg-white border border-gray-300 rounded p-3 cursor-grab transition-shadow hover:shadow-md active:opacity-70'

priority-low:
  base: 'text-gray-500'

priority-normal:
  base: 'text-blue-500'

priority-high:
  base: 'text-orange-500'

priority-urgent:
  base: 'text-red-500'

lane-wip:
  base: ''

wip-exceeded:
  base: 'text-red-600 font-bold'

# board grid layout
board-grid:
  base: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4'

# project settings helpers
settings-container:
  base: 'p-4'
settings-header:
  base: 'flex justify-between items-center mb-4'
settings-content:
  base: 'space-y-4'

# task detail and related
task-detail-inline:
  base: 'bg-white p-4 rounded shadow'

task-detail-modal:
  base: 'fixed inset-0 bg-white p-4 overflow-auto'

task-detail-header:
  base: 'flex justify-between items-center mb-4'

task-detail-content:
  base: 'space-y-4'

task-info:
  base: 'grid grid-cols-2 gap-2 text-sm'

task-info-grid:
  base: 'grid grid-cols-2 gap-2 text-sm'

task-description:
  base: 'text-sm text-gray-600'

# modal helpers for confirmation dialogs
modal-overlay:
  base: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center'

modal-dialog:
  base: 'bg-white rounded-lg w-full max-w-md p-4'

modal-header:
  base: 'mb-2'

modal-body:
  base: 'mb-4'

modal-footer:
  base: 'flex justify-end gap-2'
