services:
  # Primary storage (local IndexedDB)
  store_local:
    adapter: plugin
    provider: store
    backend: local
    persistence:
      driver: indexeddb
      dbName: kanban-db
      keyPrefix: 'kanban:'
    models:
      projects:
        fields:
          id:
            type: uuid
            primary: true
          name:
            type: string
            required: true
            maxLength: 100
          description:
            type: string
            maxLength: 500
          owner:
            type: string
            required: true
          created:
            type: timestamp
            readonly: true
          updated:
            type: timestamp
            readonly: true
          archived:
            type: boolean
            default: false
        indexes:
          - [owner, created]
          - [owner, archived]

      boards:
        fields:
          id:
            type: uuid
            primary: true
          projectId:
            type: uuid
            required: true
            foreign: projects
          name:
            type: string
            required: true
            maxLength: 100
          color:
            type: string
            pattern: '^#[0-9a-f]{6}$'
          description:
            type: string
          created:
            type: timestamp
            readonly: true
          updated:
            type: timestamp
            readonly: true
          deletedAt:
            type: timestamp
            soft-delete: true
        indexes:
          - [projectId]

      tasks:
        fields:
          id:
            type: uuid
            primary: true
          boardId:
            type: uuid
            required: true
            foreign: boards
          laneId:
            type: uuid
            required: true
          title:
            type: string
            required: true
            maxLength: 200
          description:
            type: string
          assignee:
            type: string
          due:
            type: timestamp
          priority:
            type: enum
            values: [low, normal, high, urgent]
            default: normal
          points:
            type: integer
            min: 0
            max: 100
          order:
            type: number
          labels:
            type: array<string>
          created:
            type: timestamp
            readonly: true
          updated:
            type: timestamp
            readonly: true
          state:
            type: string
            default: idle
          metadata:
            type: json
        indexes:
          - [boardId, laneId]
          - [boardId, state]
          - [assignee]

      lanes:
        fields:
          id:
            type: uuid
            primary: true
          boardId:
            type: uuid
            required: true
            foreign: boards
          name:
            type: string
            required: true
            maxLength: 100
          color:
            type: string
          order:
            type: number
          wip:
            type: integer
            default: 0
          created:
            type: timestamp
            readonly: true
          updated:
            type: timestamp
            readonly: true
        indexes:
          - [boardId, order]

  # Optional: Remote sync for teams
  store_hybrid:
    adapter: plugin
    provider: store
    backend: hybrid
    local:
      persistence:
        driver: indexeddb
        dbName: kanban-db
    remote:
      baseUrl: http://localhost:3000/api/kanban
      auth:
        type: bearer
    sync:
      strategy: crdt
      batchInterval: 5000
      optimisticWrites: true
      fallbackWhenOffline: local
