<div ux-style="settings-container">
  <div ux-style="settings-header">
    <h2>{{i18n('settings.title')}}</h2>
    <div style="display: flex; gap: 8px;">
      <button @click="emit('EDIT')" ux-style="btn-secondary">{{i18n('settings.edit')}}</button>
      <div class="help-wrapper">
        <button class="help-button" type="button" title="Get help about project settings">?</button>
        <div class="help-popover" role="dialog" aria-label="Help content">
          <div class="help-popover-header">
            <h3>Project Settings Help</h3>
            <button class="help-close-btn" type="button" aria-label="Close help">×</button>
          </div>
          <div class="help-popover-content">
            <ux-markdown ux-src="ux/help/project-settings.md" />
          </div>
        </div>
        <div class="help-overlay"></div>
      </div>
      <button @click="emit('CLOSE')" ux-style="btn-icon">×</button>
    </div>
  </div>
  <div ux-style="settings-content">
    <!-- settings panels go here -->
  </div>
</div>
