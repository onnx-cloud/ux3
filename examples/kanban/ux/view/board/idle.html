<main ux-style="container">
  <header ux-style="board-header">
    <button ux-style="btn-icon" @click="navigateTo('/')">←</button>
    <h1 ux-style="header-title">{{selectedBoard.name}}</h1>
    <button ux-event="CREATE_TASK" ux-style="btn-primary">{{i18n('tasks.create')}}</button>
  </header>
  <div ux-style="filter-bar">
    <select ux-event="FILTER" name="assignee" ux-style="filter-select">
      <option value="">{{i18n('tasks.assignee')}}</option>
      <!-- dynamically populated options -->
    </select>
    <select ux-event="FILTER" name="priority" ux-style="filter-select">
      <option value="">{{i18n('tasks.priority')}}</option>
      <option value="low">Low</option>
      <option value="normal">Normal</option>
      <option value="high">High</option>
      <option value="urgent">Urgent</option>
    </select>
  </div>
  <div ux-style="kanban-grid">
    <!-- lanes will render here -->
  </div>
</main>
