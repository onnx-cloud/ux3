<main ux-style="kanban" class="container mx-auto p-4">
  <header class="board-header flex justify-between items-center mb-4">
    <button class="btn-icon text-2xl" @click="navigateTo('/')">←</button>
    <h1 class="text-2xl font-semibold">{{selectedBoard.name}}</h1>
    <button ux-event="CREATE_TASK" class="btn-primary px-3 py-1 bg-green-600 text-white rounded hover:bg-green-700">{{i18n('tasks.create')}}</button>
  </header>
  <div class="filter-bar flex gap-2 mb-4">
    <select ux-event="FILTER" name="assignee" class="border rounded p-1">
      <option value="">{{i18n('tasks.assignee')}}</option>
      <!-- dynamically populated options -->
    </select>
    <select ux-event="FILTER" name="priority" class="border rounded p-1">
      <option value="">{{i18n('tasks.priority')}}</option>
      <option value="low">Low</option>
      <option value="normal">Normal</option>
      <option value="high">High</option>
      <option value="urgent">Urgent</option>
    </select>
  </div>
  <div class="kanban-grid">
    <!-- lanes will render here -->
  </div>
</main>
