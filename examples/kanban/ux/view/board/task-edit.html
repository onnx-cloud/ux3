<form ux-event="SUBMIT" class="task-form">
  {{#if ctx.error}}
    <div ux-style="alert-error">{{ctx.error}}</div>
  {{/if}}
  <label ux-style="form-label">{{i18n('tasks.titleLabel')}}<input name="title" :value="ctx.task.title" ux-style="form-input" /></label>
  <label ux-style="form-label">{{i18n('tasks.descriptionLabel')}}<textarea name="description" ux-style="form-input">{{ctx.task.description}}</textarea></label>
  <label ux-style="form-label">{{i18n('tasks.priority')}}
    <select name="priority" :value="ctx.task.priority" ux-style="form-input">
      <option value="low">Low</option>
      <option value="normal">Normal</option>
      <option value="high">High</option>
      <option value="urgent">Urgent</option>
    </select>
  </label>
  <label ux-style="form-label">{{i18n('tasks.due')}}<input type="date" name="due" :value="ctx.task.due" ux-style="form-input" /></label>
  <label ux-style="form-label">{{i18n('tasks.points')}}<input type="number" name="points" min="0" max="100" :value="ctx.task.points" ux-style="form-input" /></label>
  <button type="submit" ux-style="btn-primary">{{i18n('forms.submit')}}</button>
  <button type="button" ux-event="CANCEL" ux-style="btn-secondary">{{i18n('forms.cancel')}}</button>
</form>
