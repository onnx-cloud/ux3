<form ux-event="SUBMIT" class="space-y-4">
  {{#if ctx.error}}
    <div class="alert alert-error text-red-600">{{ctx.error}}</div>
  {{/if}}
  <label class="block">
    {{i18n('tasks.titleLabel')}}
    <input name="title" class="w-full border rounded p-2" />
  </label>
  <label class="block">
    {{i18n('tasks.descriptionLabel')}}
    <textarea name="description" class="w-full border rounded p-2"></textarea>
  </label>
  <label class="block">
    {{i18n('tasks.priority')}}
    <select name="priority" class="w-full border rounded p-2">
      <option value="low">Low</option>
      <option value="normal" selected>Normal</option>
      <option value="high">High</option>
      <option value="urgent">Urgent</option>
    </select>
  </label>
  <label class="block">
    {{i18n('tasks.due')}}
    <input type="date" name="due" class="w-full border rounded p-2" />
  </label>
  <label class="block">
    {{i18n('tasks.points')}}
    <input type="number" name="points" min="0" max="100" class="w-full border rounded p-2" />
  </label>
  <div class="flex gap-2">
    <button type="submit" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">{{i18n('forms.submit')}}</button>
    <button type="button" ux-event="CANCEL" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">{{i18n('forms.cancel')}}</button>
  </div>
</form>
