<form ux-event="SUBMIT" ux-style="form-space">
  {{#if ctx.error}}
    <div ux-style="alert-error">{{ctx.error}}</div>
  {{/if}}
  <label ux-style="form-label">
    {{i18n('tasks.titleLabel')}}
    <input name="title" ux-style="form-input" />
  </label>
  <label ux-style="form-label">
    {{i18n('tasks.descriptionLabel')}}
    <textarea name="description" ux-style="form-input"></textarea>
  </label>
  <label ux-style="form-label">
    {{i18n('tasks.priority')}}
    <select name="priority" ux-style="form-input">
      <option value="low">Low</option>
      <option value="normal" selected>Normal</option>
      <option value="high">High</option>
      <option value="urgent">Urgent</option>
    </select>
  </label>
  <label ux-style="form-label">
    {{i18n('tasks.due')}}
    <input type="date" name="due" ux-style="form-input" />
  </label>
  <label ux-style="form-label">
    {{i18n('tasks.points')}}
    <input type="number" name="points" min="0" max="100" ux-style="form-input" />
  </label>
  <div ux-style="button-group">
    <button type="submit" ux-style="btn-primary">{{i18n('forms.submit')}}</button>
    <button type="button" ux-event="CANCEL" ux-style="btn-secondary">{{i18n('forms.cancel')}}</button>
  </div>
</form>
