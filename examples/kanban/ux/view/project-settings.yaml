name: ProjectSettings
description: Project metadata and board management
initial: loading

context:
  projectId: null
  project: null
  boards: []
  editMode: false
  error: null

states:
  loading:
    invoke:
      service: store.local
    on:
      SUCCESS: { target: loadingBoards, actions: [setProject] }
      ERROR: error

  loadingBoards:
    invoke:
      service: store.local
    on:
      SUCCESS: { target: idle, actions: [setBoards] }
      ERROR: error

  idle:
    template: 'view/project-settings/idle.html'
    on:
      EDIT: editProject
      BACK: { emit: navigateHome }

  editProject:
    template: 'view/project-settings/edit-project.html'
    on:
      SUBMIT: savingProject
      CANCEL: idle

  savingProject:
    invoke:
      service: store.local
    on:
      SUCCESS: { target: idle, actions: [updateProjectLocal, clearForm] }
      ERROR: { target: editProject, actions: [setError] }

  boardForm:
    template: 'view/project-settings/board-form.html'
    on:
      SUBMIT: creatingBoard
      CANCEL: idle

  creatingBoard:
    invoke:
      service: store.local
    on:
      SUCCESS: { target: loadingBoards, actions: [clearForm] }
      ERROR: { target: boardForm, actions: [setError] }

  boardDeleting:
    invoke:
      service: store.local
    on:
      SUCCESS: { target: loadingBoards }
      ERROR: { target: idle, actions: [setError] }

  error:
    template: 'view/project-settings/error.html'
    on:
      RETRY: loading
      DISMISS: idle
