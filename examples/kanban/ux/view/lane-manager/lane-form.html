<form ux-event="SUBMIT" ux-style="form-space">
  <label ux-style="form-label">{{i18n('lanes.nameLabel')}}
    <input name="name" placeholder="{{i18n('lanes.nameLabel')}}" value="{{ctx.form.name || ''}}" ux-style="form-input" />
  </label>
  <div ux-style="button-group">
    <button type="submit" ux-style="btn-primary">{{i18n('forms.submit')}}</button>
    <button type="button" ux-event="CANCEL" ux-style="btn-secondary">{{i18n('forms.cancel')}}</button>
  </div>
</form>
