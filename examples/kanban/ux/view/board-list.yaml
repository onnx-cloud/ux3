name: BoardList
description: List and manage boards in project
initial: loading

context:
  projectId: null
  boards: []
  selectedBoardId: null
  filter:
    search: ''
  error: null

states:
  loading:
    invoke:
      service: store.local
    on:
      SUCCESS: { target: idle, actions: [setBoards] }
      ERROR: error

  idle:
    template: 'view/board-list/idle.html'
    on:
      SELECT_BOARD: { emit: selectBoard }
      DELETE_BOARD: deleting

  boardForm:
    template: 'view/board-list/board-form.html'
    on:
      SUBMIT: creating
      CANCEL: idle

  creating:
    invoke:
      service: store.local
    on:
      SUCCESS: { target: loading, actions: [clearForm] }
      ERROR: { target: boardForm, actions: [setError] }

  editing:
    template: 'view/board-list/board-form.html'
    on:
      SUBMIT: updating
      CANCEL: idle

  updating:
    invoke:
      service: store.local
    on:
      SUCCESS: { target: loading, actions: [clearForm] }
      ERROR: { target: editing, actions: [setError] }

  deleting:
    invoke:
      service: store.local
    on:
      SUCCESS: { target: loading }
      ERROR: { target: idle, actions: [setError] }

  error:
    template: 'view/board-list/error.html'
    on:
      RETRY: loading
      DISMISS: idle
