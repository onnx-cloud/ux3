<form ux-event="SUBMIT" class="space-y-4">
  {{#if ctx.error}}
    <div class="alert alert-error text-red-600">{{ctx.error}}</div>
  {{/if}}
  <label class="block">
    {{i18n('projects.nameLabel')}}
    <input name="name" class="w-full border rounded p-2" placeholder="{{i18n('projects.nameLabel')}}" />
  </label>
  <div class="flex gap-2">
    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">{{i18n('forms.submit')}}</button>
    <button type="button" ux-event="CANCEL" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">{{i18n('forms.cancel')}}</button>
  </div>
</form>
