<form ux-event="SUBMIT" class="space-y-4">
  {{#if ctx.error}}
    <div ux-style="alert-error">{{ctx.error}}</div>
  {{/if}}
  <label ux-style="form-label">
    {{i18n('projects.nameLabel')}}
    <input name="name" ux-style="form-input" placeholder="{{i18n('projects.nameLabel')}}" />
  </label>
  <div class="flex gap-2">
    <button type="submit" ux-style="btn-primary">{{i18n('forms.submit')}}</button>
    <button type="button" ux-event="CANCEL" ux-style="btn-secondary">{{i18n('forms.cancel')}}</button>
  </div>
</form>
