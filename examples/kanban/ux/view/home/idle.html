<main ux-style="container">
  <header ux-style="project-header">
    <h1 ux-style="header-title">{{i18n('projects.title')}}</h1>
    <div ux-style="button-group">
      <button ux-event="CREATE_PROJECT" ux-style="btn-primary">{{i18n('projects.create')}}</button>
      <div ux-style="help-wrapper">
        <button ux-style="help-button" type="button" title="Get help about projects">?</button>
        <div ux-style="help-popover" role="dialog" aria-label="Help content">
          <div ux-style="help-popover-header">
            <h3>Home Help</h3>
            <button ux-style="help-close-btn" type="button" aria-label="Close help">×</button>
          </div>
          <div ux-style="help-popover-content">
            <ux-markdown ux-src="ux/help/home.md" />
          </div>
        </div>
        <div ux-style="help-overlay"></div>
      </div>
    </div>
  </header>

  <div ux-style="search-bar">
    <input type="text" ux-style="search-input" placeholder="{{i18n('projects.search')}}" :query="event.target.value" />
  </div>

  {{#if ctx.projects.length === 0}}
    <div ux-style="empty-state">
      <p>{{i18n('projects.empty')}}</p>
    </div>
  {{else}}
    <div ux-style="project-grid">
      <!-- project cards go here -->
    </div>
  {{/if}}
</main>
