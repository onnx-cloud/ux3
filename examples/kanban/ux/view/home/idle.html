<main ux-style="container">
  <header ux-style="project-header">
    <h1 class="text-2xl font-bold">{{i18n('projects.title')}}</h1>
    <button ux-event="CREATE_PROJECT" ux-style="btn-primary">{{i18n('projects.create')}}</button>
  </header>

  <div ux-style="search-bar">
    <input type="text" ux-style="search-input" placeholder="{{i18n('projects.search')}}" :query="event.target.value" />
  </div>

  {{#if ctx.projects.length === 0}}
    <div ux-style="empty-state">
      <p>{{i18n('projects.empty')}}</p>
    </div>
  {{else}}
    <div ux-style="project-grid">
      <!-- project cards go here -->
    </div>
  {{/if}}
</main>
