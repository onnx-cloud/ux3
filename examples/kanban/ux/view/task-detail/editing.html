<div ux-style="task-detail-modal">
  <div ux-style="task-detail-header">
    <h2>{{i18n('tasks.title')}}: Edit</h2>
    <button @click="emit('CLOSE')" ux-style="btn-icon">×</button>
  </div>
  <form ux-event="SUBMIT" ux-style="form-space">
    {{#if ctx.error}}
      <div ux-style="alert-error">{{ctx.error}}</div>
    {{/if}}
    <label ux-style="form-label">
      {{i18n('tasks.titleLabel')}}
      <input type="text" name="title" :value="ctx.task.title" required ux-style="form-input" />
    </label>
    <label ux-style="form-label">
      {{i18n('tasks.descriptionLabel')}}
      <textarea name="description" ux-style="form-textarea">{{ctx.task.description}}</textarea>
    </label>
    <label ux-style="form-label">
      {{i18n('tasks.priority')}}
      <select name="priority" :value="ctx.task.priority" ux-style="form-input">
        <option value="low">{{i18n('validation.invalidPriority')}}</option>
        <option value="normal">Normal</option>
        <option value="high">High</option>
        <option value="urgent">Urgent</option>
      </select>
    </label>
    <label ux-style="form-label">
      {{i18n('tasks.due')}}
      <input type="date" name="dueDate" :value="ctx.task.dueDate" ux-style="form-input" />
    </label>
    <label ux-style="form-label">
      {{i18n('tasks.points')}}
      <input type="number" name="points" min="0" max="100" :value="ctx.task.points" ux-style="form-input" />
    </label>
    <label ux-style="form-label">
      {{i18n('tasks.assignee')}}
      <input type="text" name="assignee" :value="ctx.task.assignee" ux-style="form-input" />
    </label>
    <div ux-style="form-actions">
      <button type="submit" ux-style="btn-primary">{{i18n('forms.submit')}}</button>
      <button type="button" ux-event="CANCEL" ux-style="btn-secondary">{{i18n('forms.cancel')}}</button>
      <button type="button" ux-event="REQUEST_DELETE" ux-style="btn-danger">{{i18n('forms.delete')}}</button>
    </div>
  </form>
</div>
