name: TaskCard
description: Individual task card with inline state transitions
initial: idle

context:
  task: null  # Passed in via slot context
  isHovering: false
  isEditing: false
  editingField: null  # title, description, assignee, priority

states:
  idle:
    template: 'component/task-card/idle.html'
    on:
      HOVER_ENTER: { actions: [setHovering, true] }
      HOVER_LEAVE: { actions: [setHovering, false] }
      EDIT: editing
      MARK_DONE: markingDone

  editing:
    template: 'component/task-card/editing.html'
    on:
      SUBMIT: savingEdit
      CANCEL: idle
      
  savingEdit:
    invoke:
      service: store.local
    on:
      SUCCESS: { target: idle, actions: [updateTaskLocal] }
      ERROR: { target: editing, actions: [setError] }

  markingDone:
    invoke:
      service: store.local
    on:
      SUCCESS: { target: idle, actions: [updateTaskLocal] }
      ERROR: idle
