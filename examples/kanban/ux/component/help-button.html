<!-- Help Button with Popover -->
<!-- Usage: Include this component in any template and set data-help-file to the markdown file path -->

<div ux-style="help-wrapper">
<button ux-style="help-button" type="button" title="Get help" aria-label="Get help">?</button>
  
  <div ux-style="help-popover" role="dialog" aria-label="Help content">
    <div ux-style="help-popover-header">
      <h3>Help</h3>
      <button ux-style="help-close-btn" type="button" aria-label="Close help">×</button>
    </div>
    <div ux-style="help-popover-content">
      <!-- Markdown content will be inserted here by ux-markdown -->
      <ux-markdown data-help-ref></ux-markdown>
    </div>
  </div>

  <div ux-style="help-overlay"></div>

  <script>
    if (typeof window !== 'undefined') {
      // Help functionality - will attach to specific instances
      function initializeHelpButton(container) {
        const button = container.querySelector('[ux-style="help-button"]');
        const popover = container.querySelector('[ux-style="help-popover"]');
        const closeBtn = container.querySelector('[ux-style="help-close-btn"]');
        const overlay = container.querySelector('[ux-style="help-overlay"]');

        if (!button || !popover) return;

        button.addEventListener('click', (e) => {
          e.stopPropagation();
          popover.classList.toggle('show');
          overlay.classList.toggle('show');
        });

        closeBtn.addEventListener('click', () => {
          popover.classList.remove('show');
          overlay.classList.remove('show');
        });

        overlay.addEventListener('click', () => {
          popover.classList.remove('show');
          overlay.classList.remove('show');
        });

        // Close on Escape
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && popover.classList.contains('show')) {
            popover.classList.remove('show');
            overlay.classList.remove('show');
          }
        });
      }

      // Initialize when DOM is ready
      document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('[ux-style="help-wrapper"]').forEach(initializeHelpButton);
      });
    }
  </script>
</div>
