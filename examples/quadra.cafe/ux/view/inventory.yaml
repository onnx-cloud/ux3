name: Inventory
layout: admin
initial: loading

context:
  ingredients: []
  lowStockItems: []
  reorderAlerts: []
  selectedIngredient: null
  error: null

states:
  loading:
    template: 'view/inventory/loading.html'
    invoke:
      service: inventory
      method: getAllIngredients
    on:
      SUCCESS:
        target: viewing
        action: onInventoryLoaded
      ERROR: error

  viewing:
    template: 'view/inventory/viewing.html'
    on:
      LOG_USAGE: logging_usage
      LOG_WASTE: logging_waste
      ADJUST_STOCK: adjusting
      PLACE_REORDER: placing_reorder
      VIEW_HISTORY: viewing_history
      REFRESH: loading

  logging_usage:
    template: 'view/inventory/logging_usage.html'
    on:
      CONFIRM: submitting_usage
      CANCEL: viewing

  submitting_usage:
    invoke:
      service: inventory
      method: logUsage
      input: '{{ { ingredientId: ctx.selectedIngredient.id, quantity: 1 } }}'
    on:
      SUCCESS: viewing
      ERROR: logging_usage

  logging_waste:
    template: 'view/inventory/logging_waste.html'
    on:
      CONFIRM: submitting_waste
      CANCEL: viewing

  submitting_waste:
    invoke:
      service: inventory
      method: logWaste
      input: '{{ { ingredientId: ctx.selectedIngredient.id, quantity: 1 } }}'
    on:
      SUCCESS: viewing
      ERROR: logging_waste

  adjusting:
    template: 'view/inventory/adjusting.html'
    on:
      CONFIRM: submitting_adjustment
      CANCEL: viewing

  submitting_adjustment:
    invoke:
      service: inventory
      method: adjustStock
      input: '{{ ctx.selectedIngredient }}'
    on:
      SUCCESS: viewing
      ERROR: adjusting

  placing_reorder:
    template: 'view/inventory/placing_reorder.html'
    on:
      CONFIRM: submitting_reorder
      CANCEL: viewing

  submitting_reorder:
    invoke:
      service: inventory
      method: createReorder
      input: '{{ { ingredientId: ctx.selectedIngredient.id, quantity: 10 } }}'
    on:
      SUCCESS:
        target: viewing
        action: onReorderCreated
      ERROR: placing_reorder

  viewing_history:
    template: 'view/inventory/viewing_history.html'
    on:
      BACK: viewing

  error:
    template: 'view/inventory/error.html'
    on:
      RETRY: loading
