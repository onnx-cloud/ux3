<div ux-state="reservation.waiting_for_table" class="max-w-2xl mx-auto p-6">
  <div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-xl font-bold text-gray-900 mb-4">You're on the Waitlist</h2>
    <div class="text-center mb-6">
      <p class="text-3xl font-bold text-blue-600 mb-2">#{{ ctx.waitlistPosition }}</p>
      <p class="text-gray-600">Your position in the waitlist</p>
    </div>
    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
      <p class="text-sm text-blue-900">We'll notify you when a table becomes available.</p>
    </div>
    <button type="button" ux-event="CANCEL_WAITLIST" class="w-full px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">
      Leave Waitlist
    </button>
  </div>
</div>
