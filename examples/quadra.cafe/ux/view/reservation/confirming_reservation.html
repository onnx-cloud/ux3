<div ux-state="reservation.confirming_reservation" class="max-w-2xl mx-auto p-6">
  <div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-xl font-bold text-gray-900 mb-4">Confirm Reservation</h2>
    <div class="space-y-3 pb-4 border-b mb-4">
      <div class="flex justify-between">
        <span class="text-gray-600">Date & Time</span>
        <span class="font-semibold">{{ ctx.reservation.dateTime }}</span>
      </div>
      <div class="flex justify-between">
        <span class="text-gray-600">Party Size</span>
        <span class="font-semibold">{{ ctx.reservation.partySize }} Guests</span>
      </div>
      <div class="flex justify-between">
        <span class="text-gray-600">Table</span>
        <span class="font-semibold">Table {{ ctx.selectedTable.number }}</span>
      </div>
    </div>
    <div class="flex gap-3">
      <button type="button" ux-event="CONFIRM" class="flex-1 px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">
        Confirm Reservation
      </button>
      <button type="button" ux-event="CANCEL" class="flex-1 px-4 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600">
        Go Back
      </button>
    </div>
  </div>
</div>
