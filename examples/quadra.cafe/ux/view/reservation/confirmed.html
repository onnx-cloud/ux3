<div ux-state="reservation.confirmed" class="max-w-4xl mx-auto p-6">
  <div class="bg-green-50 border border-green-200 rounded-lg p-6 mb-6">
    <h1 class="text-2xl font-bold text-green-900 mb-2">Reservation Confirmed</h1>
    <p class="text-green-800">Your table is reserved!</p>
  </div>

  <div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-lg font-semibold text-gray-900 mb-4">Reservation Details</h2>
    <div class="space-y-3 pb-4 border-b">
      <div class="flex justify-between">
        <span class="text-gray-600">Name</span>
        <span class="font-semibold">{{ ctx.reservation.partyName }}</span>
      </div>
      <div class="flex justify-between">
        <span class="text-gray-600">Date & Time</span>
        <span class="font-semibold">{{ ctx.reservation.dateTime }}</span>
      </div>
      <div class="flex justify-between">
        <span class="text-gray-600">Party Size</span>
        <span class="font-semibold">{{ ctx.reservation.partySize }} Guests</span>
      </div>
      <div class="flex justify-between">
        <span class="text-gray-600">Table</span>
        <span class="font-semibold">Table {{ ctx.selectedTable.number }}</span>
      </div>
    </div>
    <div class="mt-6 flex gap-3">
      <button type="button" ux-event="MODIFY" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
        Modify
      </button>
      <button type="button" ux-event="MARK_SEATED" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">
        Mark Seated
      </button>
      <button type="button" ux-event="CANCEL" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">
        Cancel
      </button>
    </div>
  </div>
</div>
