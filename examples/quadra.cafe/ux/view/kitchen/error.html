<div ux-state="kitchen.error" class="h-screen bg-red-50 flex items-center justify-center p-6">
  <div class="bg-white rounded-lg shadow p-6 max-w-md">
    <h2 class="text-lg font-bold text-red-900 mb-2">Connection Error</h2>
    <p class="text-red-800 mb-4">Failed to connect to kitchen display system</p>
    <button type="button" ux-event="RETRY" class="w-full px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">
      Retry Connection
    </button>
  </div>
</div>
