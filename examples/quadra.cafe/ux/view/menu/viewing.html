<div ux-state="menu.viewing" class="max-w-6xl mx-auto p-6">
  <div class="mb-6 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-900">Menu Management</h1>
    <button type="button" ux-event="CREATE_ITEM" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
      Add Dish
    </button>
  </div>

  <div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Dish</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Price</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Prep Time</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Status</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        {{#each ctx.items}}
        <tr>
          <td class="px-6 py-4 text-gray-900 font-semibold">{{ this.name }}</td>
          <td class="px-6 py-4 text-gray-700">${{ this.price }}</td>
          <td class="px-6 py-4 text-gray-700">{{ this.preparationTime }} min</td>
          <td class="px-6 py-4">
            <span class="px-2 py-1 rounded text-xs font-semibold {{#if this.isAvailable}}bg-green-100 text-green-800{{else}}bg-red-100 text-red-800{{/if}}">
              {{ this.isAvailable ? 'Available' : 'Unavailable' }}
            </span>
          </td>
          <td class="px-6 py-4 space-x-2">
            <button type="button" ux-event="EDIT_ITEM" class="text-blue-600 hover:text-blue-800">Edit</button>
            <button type="button" ux-event="TOGGLE_AVAILABILITY" class="text-purple-600 hover:text-purple-800">Toggle</button>
          </td>
        </tr>
        {{/each}}
      </tbody>
    </table>
  </div>
</div>
