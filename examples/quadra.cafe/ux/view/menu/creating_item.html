<div ux-state="menu.creating_item" class="max-w-2xl mx-auto p-6">
  <div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-xl font-bold text-gray-900 mb-4">Add New Dish</h2>
    <form class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Dish Name</label>
        <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md" placeholder="e.g., Margherita Pizza" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
        <textarea class="w-full px-3 py-2 border border-gray-300 rounded-md" rows="3" placeholder="Dish description"></textarea>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Price</label>
          <input type="number" step="0.01" class="w-full px-3 py-2 border border-gray-300 rounded-md" placeholder="0.00" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Prep Time (min)</label>
          <input type="number" class="w-full px-3 py-2 border border-gray-300 rounded-md" placeholder="15" />
        </div>
      </div>
    </form>
    <div class="mt-6 flex gap-3">
      <button type="button" ux-event="SAVE_ITEM" class="flex-1 px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">
        Save Dish
      </button>
      <button type="button" ux-event="CANCEL" class="flex-1 px-4 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600">
        Cancel
      </button>
    </div>
  </div>
</div>
