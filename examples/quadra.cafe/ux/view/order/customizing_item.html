<div ux-state="order.customizing_item" class="max-w-2xl mx-auto p-6">
  <div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">{{ ctx.selectedItems[0]?.name }}</h2>
    
    <form class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Quantity</label>
        <input 
          type="number" 
          min="1" 
          value="1"
          class="w-full border border-gray-300 rounded-md px-3 py-2"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Special Instructions</label>
        <textarea 
          class="w-full border border-gray-300 rounded-md px-3 py-2"
          rows="3"
          placeholder="Any special requests?"
        ></textarea>
      </div>
    </form>

    <div class="mt-6 flex gap-3">
      <button type="button" ux-event="ADD_TO_ORDER" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
        Add to Order
      </button>
      <button type="button" ux-event="CANCEL" class="flex-1 px-4 py-2 bg-gray-400 text-white rounded-md hover:bg-gray-500">
        Cancel
      </button>
    </div>
  </div>
</div>
