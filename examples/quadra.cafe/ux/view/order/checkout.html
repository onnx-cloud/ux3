<div ux-state="order.checkout" class="max-w-2xl mx-auto p-6">
  <div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-xl font-bold text-gray-900 mb-4">Payment</h2>
    
    <div class="space-y-4 pb-4 border-b">
      <div class="flex justify-between">
        <span>Subtotal</span>
        <span>${{ ctx.order.subtotal.toFixed(2) }}</span>
      </div>
      <div class="flex justify-between">
        <span>Tax</span>
        <span>${{ ctx.order.tax.toFixed(2) }}</span>
      </div>
      <div class="flex justify-between text-lg font-bold text-gray-900">
        <span>Total Due</span>
        <span>${{ ctx.order.total.toFixed(2) }}</span>
      </div>
    </div>

    <div class="mt-6 space-y-3">
      <label class="block">
        <input type="radio" name="payment-method" value="card" class="mr-2" checked />
        <span class="text-gray-900">Credit Card</span>
      </label>
      <label class="block">
        <input type="radio" name="payment-method" value="cash" class="mr-2" />
        <span class="text-gray-900">Cash</span>
      </label>
    </div>

    <div class="mt-6 flex gap-3">
      <button type="button" ux-event="PROCESS_PAYMENT" class="flex-1 px-4 py-3 bg-green-600 text-white rounded-md hover:bg-green-700 font-semibold">
        Complete Payment
      </button>
      <button type="button" ux-event="CANCEL" class="px-4 py-3 bg-gray-500 text-white rounded-md hover:bg-gray-600">
        Back
      </button>
    </div>
  </div>
</div>
