<div ux-state="order.error" class="max-w-4xl mx-auto p-6">
  <div class="bg-red-50 border border-red-200 rounded-lg p-6">
    <h2 class="text-lg font-bold text-red-900 mb-2">Error Processing Order</h2>
    <p class="text-red-800 mb-4">{{ ctx.error }}</p>
    <div class="flex gap-3">
      <button type="button" ux-event="RETRY" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">
        Retry
      </button>
      <button type="button" ux-event="CANCEL" class="px-4 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600">
        Cancel
      </button>
    </div>
  </div>
</div>
