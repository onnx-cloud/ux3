<div ux-state="order.browsing_menu" class="max-w-6xl mx-auto p-6">
  <div class="mb-6 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-900">Menu</h1>
    <button type="button" ux-event="BACK" class="px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700">
      Back
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {{#each ctx.availableTables}}
    <div class="bg-white rounded-lg shadow p-4 hover:shadow-lg transition cursor-pointer" ux-event="SELECT_ITEM">
      <h3 class="text-lg font-semibold text-gray-900">{{ this.name }}</h3>
      <p class="text-gray-600 text-sm mt-2">{{ this.description }}</p>
      <div class="mt-4 flex justify-between items-center">
        <span class="text-2xl font-bold text-blue-600">${{ this.price }}</span>
        <button type="button" ux-event="SELECT_ITEM" class="px-3 py-1 bg-blue-600 text-white rounded text-sm hover:bg-blue-700">
          Add
        </button>
      </div>
    </div>
    {{/each}}
  </div>
</div>
