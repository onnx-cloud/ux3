<div ux-state="order.confirming_send" class="max-w-2xl mx-auto p-6">
  <div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-xl font-bold text-gray-900 mb-4">Confirm Order</h2>
    <p class="text-gray-700 mb-4">Ready to send {{ ctx.order.items.length }} items to the kitchen?</p>
    
    <div class="space-y-2 pb-4 border-b mb-4">
      {{#each ctx.order.items}}
      <div class="flex justify-between text-sm">
        <span>{{ this.name }} x {{ this.quantity }}</span>
        <span>${{ (this.price * this.quantity).toFixed(2) }}</span>
      </div>
      {{/each}}
    </div>

    <div class="text-lg font-bold mb-6">
      Total: ${{ ctx.order.total.toFixed(2) }}
    </div>

    <div class="flex gap-3">
      <button type="button" ux-event="CONFIRM" class="flex-1 px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">
        Confirm & Send to Kitchen
      </button>
      <button type="button" ux-event="CANCEL" class="flex-1 px-4 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600">
        Go Back
      </button>
    </div>
  </div>
</div>
