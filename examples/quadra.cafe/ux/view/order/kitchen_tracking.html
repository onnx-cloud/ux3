<div ux-state="order.kitchen_tracking" class="max-w-2xl mx-auto p-6">
  <div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">Order #{{ ctx.order.orderNumber }}</h2>
    
    <div class="mb-6 p-4 bg-blue-50 rounded-lg">
      <p class="text-lg font-semibold text-blue-900">Estimated Ready Time: {{ ctx.estimatedReadyTime }} min</p>
    </div>

    <div class="space-y-3 mb-6">
      {{#each ctx.order.items}}
      <div class="border rounded-lg p-4">
        <div class="flex justify-between items-start">
          <div>
            <h4 class="font-semibold text-gray-900">{{ this.name }}</h4>
            <p class="text-sm text-gray-600">Qty: {{ this.quantity }}</p>
          </div>
          <span class="inline-block px-3 py-1 bg-yellow-100 text-yellow-800 rounded text-sm font-semibold">
            Preparing...
          </span>
        </div>
      </div>
      {{/each}}
    </div>

    <button type="button" ux-event="MARK_COMPLETE" class="w-full px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">
      Mark as Served
    </button>
  </div>
</div>
