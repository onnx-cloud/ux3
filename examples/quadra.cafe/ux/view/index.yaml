name: Index
layout: default
initial: loading

states:
  loading:
    template: 'view/index/loading.html'
    invoke:
      service: ops-api
      method: getRestaurantStatus
    on:
      SUCCESS: dashboard
      ERROR: error

  dashboard:
    template: 'view/index/dashboard.html'
    on:
      NAVIGATE_TO: dashboard

  error:
    template: 'view/index/error.html'
    on:
      RETRY: loading
