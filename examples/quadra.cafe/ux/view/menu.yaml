name: Menu
layout: admin
initial: loading

context:
  categories: []
  items: []
  selectedCategory: null
  newItem:
    name: ""
    description: ""
    price: 0
    category: ""
    isAvailable: true
    preparationTime: 0
  editingItem: null
  error: null

states:
  loading:
    template: 'view/menu/loading.html'
    invoke:
      service: ops-api
      method: getMenu
    on:
      SUCCESS:
        target: viewing
        action: onMenuLoaded
      ERROR: error

  viewing:
    template: 'view/menu/viewing.html'
    on:
      CREATE_ITEM: creating_item
      EDIT_ITEM:
        target: editing
        action: selectItemForEdit
      TOGGLE_AVAILABILITY:
        target: updating_availability
        action: selectItemForEdit
      REFRESH: loading

  creating_item:
    template: 'view/menu/creating_item.html'
    on:
      SAVE_ITEM: submitting_item
      CANCEL: viewing

  editing:
    template: 'view/menu/editing.html'
    on:
      SAVE_ITEM: submitting_item
      CANCEL: viewing

  submitting_item:
    invoke:
      service: ops-api
      method: '{{ ctx.editingItem?.id ? "updateItem" : "createItem" }}'
      input: '{{ ctx.editingItem || ctx.newItem }}'
    on:
      SUCCESS:
        target: viewing
        action: onMenuItemSaved
      ERROR:
        target: '{{ ctx.editingItem?.id ? "editing" : "creating_item" }}'

  updating_availability:
    invoke:
      service: ops-api
      method: updateItemAvailability
      input: '{{ { itemId: ctx.editingItem.id, isAvailable: !ctx.editingItem.isAvailable } }}'
    on:
      SUCCESS:
        target: viewing
        action: toggleItemAvailability
      ERROR: viewing

  error:
    template: 'view/menu/error.html'
    on:
      RETRY: loading
