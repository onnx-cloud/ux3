name: Reservation
layout: default
initial: loading

context:
  reservation:
    id: null
    partyName: ""
    partySize: 2
    dateTime: null
    status: "pending"
    notes: ""
    phoneNumber: ""
  availableTables: []
  selectedTable: null
  waitlistPosition: null
  error: null

states:
  loading:
    template: 'view/reservation/loading.html'
    invoke:
      service: ops-api
      method: getAvailableSlots
      input: '{{ { partySize: ctx.reservation.partySize, dateTime: ctx.reservation.dateTime } }}'
    on:
      SUCCESS:
        target: viewing_slots
        action: onSlotsLoaded
      ERROR:
        target: error

  viewing_slots:
    template: 'view/reservation/viewing_slots.html'
    on:
      SELECT_TABLE:
        target: confirming_reservation
        action: selectTable
      MODIFY_PARTY_SIZE:
        target: loading
        action: updatePartySize
      REQUEST_WAITLIST: waitlist_joining

  waitlist_joining:
    invoke:
      service: ops-api
      method: joinWaitlist
      input: '{{ { partySize: ctx.reservation.partySize, dateTime: ctx.reservation.dateTime } }}'
    on:
      SUCCESS:
        target: waiting_for_table
        action: onWaitlistJoined
      ERROR:
        target: viewing_slots

  waiting_for_table:
    template: 'view/reservation/waiting_for_table.html'
    on:
      TABLE_AVAILABLE:
        target: confirming_table_available
        action: selectTable
      CANCEL_WAITLIST:
        target: cancelled

  confirming_table_available:
    template: 'view/reservation/confirming_table_available.html'
    on:
      CONFIRM: submitting_reservation
      DECLINE: waiting_for_table

  confirming_reservation:
    template: 'view/reservation/confirming_reservation.html'
    on:
      CONFIRM: submitting_reservation
      CANCEL: viewing_slots

  submitting_reservation:
    invoke:
      service: ops-api
      method: createReservation
      input: '{{ { partySize: ctx.reservation.partySize, tableId: ctx.selectedTable.id, dateTime: ctx.reservation.dateTime } }}'
    on:
      SUCCESS:
        target: confirmed
        action: onReservationCreated
      ERROR:
        target: viewing_slots
        action: onReservationError

  confirmed:
    template: 'view/reservation/confirmed.html'
    on:
      MODIFY: modifying_reservation
      CANCEL: confirming_cancellation
      MARK_SEATED: seated

  modifying_reservation:
    template: 'view/reservation/modifying_reservation.html'
    on:
      SAVE_CHANGES:
        target: confirmed
      CANCEL: confirmed

  confirming_cancellation:
    template: 'view/reservation/confirming_cancellation.html'
    on:
      CONFIRM: cancelling
      CANCEL: confirmed

  cancelling:
    invoke:
      service: ops-api
      method: cancelReservation
      input: '{{ ctx.reservation.id }}'
    on:
      SUCCESS: cancelled
      ERROR: confirmed

  seated:
    template: 'view/reservation/seated.html'
    on:
      COMPLETE: completed
      EXTEND_SEATING: extending_time

  extending_time:
    invoke:
      service: ops-api
      method: extendSeatingTime
      input: '{{ { reservationId: ctx.reservation.id, minutes: 30 } }}'
    on:
      SUCCESS: seated
      ERROR: seated

  completed:
    template: 'view/reservation/completed.html'
    on:
      NEW_RESERVATION:
        target: loading
  cancelled:
    template: 'view/reservation/cancelled.html'
    on:
      NEW_RESERVATION:
        target: loading

  error:
    template: 'view/reservation/error.html'
    on:
      RETRY: loading
