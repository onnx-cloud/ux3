name: AuditLog
layout: admin
initial: loading

context:
  events: []
  filters:
    entityType: null
    action: null
    dateFrom: null
    dateTo: null
  isFiltering: false
  error: null

states:
  loading:
    template: 'view/audit-log/loading.html'
    invoke:
      service: audit
      method: getEvents
      input: '{{ { limit: 50, filters: ctx.filters } }}'
    on:
      SUCCESS:
        target: viewing
        action: onEventsLoaded
      ERROR:
        target: error

  viewing:
    template: 'view/audit-log/viewing.html'
    on:
      OPEN_FILTERS: filtering
      EXPORT_LOG:
        target: exporting
      EVENT_DETAIL:
        target: viewing_event_detail
      REFRESH: loading

  filtering:
    template: 'view/audit-log/filtering.html'
    on:
      APPLY_FILTERS:
        target: loading
        action: applyAuditFilters
      CANCEL: viewing

  viewing_event_detail:
    template: 'view/audit-log/event_detail.html'
    on:
      CLOSE: viewing
      DOWNLOAD_EVENT: exporting

  exporting:
    invoke:
      service: audit
      method: exportEvents
      input: '{{ ctx.filters }}'
    on:
      SUCCESS:
        target: viewing
        action: onAuditExported
      ERROR:
        target: viewing
        action: onExportError

  error:
    template: 'view/audit-log/error.html'
    on:
      RETRY: loading
