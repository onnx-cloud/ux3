<div ux-state="membership.inviting" class="max-w-2xl mx-auto p-6">
  <div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-xl font-bold text-gray-900 mb-4">Invite Team Member</h2>
    <form class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700" for="invite-email">Email Address</label>
        <input 
          type="email" 
          id="invite-email"
          class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm px-3 py-2"
          ux-event:input="CHANGE_VALUE"
          ux-value-extract="{ email: this.value }"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700" for="invite-role">Role</label>
        <select 
          id="invite-role"
          class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm px-3 py-2"
          ux-event:change="CHANGE_VALUE"
          ux-value-extract="{ role: this.value }"
        >
          <option value="viewer">Viewer (read-only)</option>
          <option value="editor">Editor (manage content)</option>
          <option value="admin">Admin (full access)</option>
        </select>
      </div>
    </form>
    <div class="mt-6 flex gap-3">
      <button type="button" ux-event="SEND_INVITE" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
        Send Invitation
      </button>
      <button type="button" ux-event="CANCEL" class="px-4 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600">
        Cancel
      </button>
    </div>
  </div>
</div>
