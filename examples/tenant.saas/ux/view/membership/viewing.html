<div ux-state="membership.viewing" class="max-w-6xl mx-auto p-6">
  <div class="mb-6 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-900">Team Members</h1>
    <button type="button" ux-event="INVITE_USER" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
      Invite Member
    </button>
  </div>

  <div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Name</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Email</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Role</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        {{#each ctx.members}}
        <tr>
          <td class="px-6 py-4 text-gray-900">{{ this.name }}</td>
          <td class="px-6 py-4 text-gray-700">{{ this.email }}</td>
          <td class="px-6 py-4 text-gray-700 capitalize">{{ this.role }}</td>
          <td class="px-6 py-4">
            <button type="button" ux-event="CHANGE_ROLE" class="text-blue-600 hover:text-blue-800 mr-3">Edit</button>
            <button type="button" ux-event="DEACTIVATE_MEMBER" class="text-red-600 hover:text-red-800">Remove</button>
          </td>
        </tr>
        {{/each}}
      </tbody>
    </table>
  </div>

  {{#if ctx.pendingInvites.length}}
  <div class="mt-8">
    <h2 class="text-xl font-bold text-gray-900 mb-4">Pending Invitations</h2>
    <div class="bg-white rounded-lg shadow overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Email</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Role</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
          {{#each ctx.pendingInvites}}
          <tr>
            <td class="px-6 py-4 text-gray-900">{{ this.email }}</td>
            <td class="px-6 py-4 text-gray-700 capitalize">{{ this.role }}</td>
            <td class="px-6 py-4">
              <button type="button" ux-event="REVOKE_INVITE" class="text-red-600 hover:text-red-800">Revoke</button>
            </td>
          </tr>
          {{/each}}
        </tbody>
      </table>
    </div>
  </div>
  {{/if}}
</div>
