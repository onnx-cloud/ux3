<div ux-state="organization.editing">
  <div class="p-8">
    <h1 class="text-3xl font-bold mb-6">{{ i18n.organization.editing.label }}</h1>
    
    <form class="bg-white rounded-lg shadow p-6 mb-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">{{ i18n.organization.viewing.nameLabel }}</label>
        <input 
          type="text" 
          value="{{ ctx.org.name }}"
          ux-event="CHANGE_VALUE"
          ux-event-value="field=name"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">{{ i18n.organization.viewing.planLabel }}</label>
        <select 
          value="{{ ctx.org.plan }}"
          ux-event="CHANGE_VALUE"
          ux-event-value="field=plan"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
        >
          <option value="starter">Starter</option>
          <option value="professional">Professional</option>
          <option value="enterprise">Enterprise</option>
        </select>
      </div>
    </form>

    <div class="flex gap-3">
      <button type="button" ux-event="SAVE" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
        {{ i18n.organization.editing.saveButton }}
      </button>
      <button type="button" ux-event="CANCEL" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">
        {{ i18n.organization.editing.cancelButton }}
      </button>
    </div>
  </div>
</div>
