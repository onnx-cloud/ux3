<div ux-state="audit-log.viewing" class="max-w-6xl mx-auto p-6">
  <div class="mb-6 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-900">Audit Log</h1>
    <div class="flex gap-3">
      <button type="button" ux-event="OPEN_FILTERS" class="px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700">
        Filters
      </button>
      <button type="button" ux-event="EXPORT_LOG" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
        Export
      </button>
    </div>
  </div>

  <div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Date</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">User</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Entity Type</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Action</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase"></th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        {{#each ctx.events}}
        <tr>
          <td class="px-6 py-4 text-gray-900">{{ this.createdAt }}</td>
          <td class="px-6 py-4 text-gray-700">{{ this.userId }}</td>
          <td class="px-6 py-4 text-gray-700 capitalize">{{ this.entityType }}</td>
          <td class="px-6 py-4 text-gray-700 uppercase">{{ this.action }}</td>
          <td class="px-6 py-4">
            <button type="button" ux-event="EVENT_DETAIL" class="text-blue-600 hover:text-blue-800">View</button>
          </td>
        </tr>
        {{/each}}
      </tbody>
    </table>
  </div>
</div>
