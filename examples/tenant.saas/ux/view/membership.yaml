name: Membership
layout: admin
initial: loading

context:
  members: []
  pendingInvites: []
  selectedMember: null
  newInviteEmail: ""
  selectedRole: "viewer"
  error: null

states:
  loading:
    template: 'view/membership/loading.html'
    invoke:
      service: org-service
      method: getMembers
    on:
      SUCCESS:
        target: viewing
        action: onMembersLoaded
      ERROR:
        target: error

  viewing:
    template: 'view/membership/viewing.html'
    on:
      INVITE_USER: inviting
      CHANGE_ROLE: changing_role
      REVOKE_INVITE: revoking
      DEACTIVATE_MEMBER: deactivating
      REFRESH: loading

  inviting:
    template: 'view/membership/inviting.html'
    on:
      SEND_INVITE:
        target: processing_invite
        guard: isValidInviteEmail
      CANCEL: viewing

  processing_invite:
    invoke:
      service: org-service
      method: inviteMember
      input: '{{ { email: ctx.newInviteEmail, role: ctx.selectedRole } }}'
    on:
      SUCCESS:
        target: viewing
        action: onInviteSent
      ERROR:
        target: inviting
        action: onInviteError

  changing_role:
    template: 'view/membership/changing_role.html'
    on:
      CONFIRM_ROLE_CHANGE:
        target: updating_role
      CANCEL: viewing

  updating_role:
    invoke:
      service: org-service
      method: updateMemberRole
      input: '{{ { memberId: ctx.selectedMember.id, role: ctx.selectedRole } }}'
    on:
      SUCCESS:
        target: viewing
        action: onRoleUpdated
      ERROR:
        target: changing_role

  deactivating:
    invoke:
      service: org-service
      method: deactivateMember
      input: '{{ ctx.selectedMember.id }}'
    on:
      SUCCESS:
        target: viewing
        action: onMemberDeactivated
      ERROR:
        target: viewing

  revoking:
    invoke:
      service: org-service
      method: revokeInvite
      input: '{{ ctx.selectedMember.id }}'
    on:
      SUCCESS:
        target: viewing
        action: onInviteRevoked
      ERROR:
        target: viewing

  error:
    template: 'view/membership/error.html'
    on:
      RETRY: loading
      DISMISS: viewing
