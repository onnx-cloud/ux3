<div ux-state="subscription.error" class="max-w-4xl mx-auto p-6">
  <div class="bg-red-50 border border-red-200 rounded-lg p-6">
    <h2 class="text-lg font-bold text-red-900 mb-2">Error Loading Subscription</h2>
    <p class="text-red-800">{{ ctx.error }}</p>
    <div class="mt-4 flex gap-3">
      <button type="button" ux-event="RETRY" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">
        Retry
      </button>
    </div>
  </div>
</div>
