<div ux-state="subscription.viewing" class="max-w-4xl mx-auto p-6">
  <div class="bg-white rounded-lg shadow p-6">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Billing & Subscription</h1>
    
    <div class="space-y-6">
      <div class="border-b pb-4">
        <h2 class="text-lg font-semibold text-gray-900 mb-3">Current Plan</h2>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <p class="text-sm text-gray-600">Plan</p>
            <p class="text-lg font-semibold capitalize">{{ ctx.subscription.plan }}</p>
          </div>
          <div>
            <p class="text-sm text-gray-600">Status</p>
            <p class="text-lg font-semibold capitalize">{{ ctx.subscription.status }}</p>
          </div>
          <div>
            <p class="text-sm text-gray-600">Next Billing Date</p>
            <p class="text-lg font-semibold">{{ ctx.subscription.nextBillingDate }}</p>
          </div>
          <div>
            <p class="text-sm text-gray-600">Period Ends</p>
            <p class="text-lg font-semibold">{{ ctx.subscription.currentPeriodEnd }}</p>
          </div>
        </div>
      </div>

      <div class="flex gap-3">
        <button type="button" ux-event="OPEN_UPGRADE" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">
          Upgrade Plan
        </button>
        <button type="button" ux-event="OPEN_DOWNGRADE" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
          Downgrade Plan
        </button>
        <button type="button" ux-event="MANAGE_PAYMENT" class="px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700">
          Manage Payment Method
        </button>
        <button type="button" ux-event="OPEN_INVOICES" class="px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700">
          View Invoices
        </button>
      </div>

      <div>
        <button type="button" ux-event="CANCEL_SUBSCRIPTION" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">
          Cancel Subscription
        </button>
      </div>
    </div>
  </div>
</div>
