name: "@ux3/plugin-oidc"
displayName: Oidc
author: UX3 Team
categories:
  - utility
ux3PeerVersion: ^0.2.0
mcp:
  tools:
    - name: oidc.info
      description: Get information about oidc plugin
      inputSchema:
        type: object
        additionalProperties: false
  resources:
