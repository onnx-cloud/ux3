name: "@ux3/plugin-data-builders"
displayName: Data Builders
author: UX3 Team
categories:
  - utility
  - data
ux3PeerVersion: ^0.2.0
mcp:
  tools:
    # Pivot Table Tools
    - name: pivot_table.info
      description: Get information about pivot table builder
      inputSchema:
        type: object
        additionalProperties: false
    - name: pivot_table.create
      description: Create a new pivot table configuration
      inputSchema:
        type: object
        additionalProperties: false
    
    # Filter Builder Tools
    - name: filter_builder.info
      description: Get information about filter builder
      inputSchema:
        type: object
        additionalProperties: false
    - name: filter_builder.create
      description: Create a new filter configuration
      inputSchema:
        type: object
        additionalProperties: false
    
    # Query Builder Tools
    - name: query_builder.info
      description: Get information about query builder
      inputSchema:
        type: object
        additionalProperties: false
    - name: query_builder.create
      description: Create a new query configuration
      inputSchema:
        type: object
        additionalProperties: false
    
    # Report Builder Tools
    - name: report_builder.info
      description: Get information about report builder
      inputSchema:
        type: object
        additionalProperties: false
    - name: report_builder.create
      description: Create a new report configuration
      inputSchema:
        type: object
        additionalProperties: false
  
  resources:
    - uri: plugin://data-builders/pivot-table/docs
      mimeType: text/markdown
      description: Pivot table builder documentation
    - uri: plugin://data-builders/filter-builder/docs
      mimeType: text/markdown
      description: Filter builder documentation
    - uri: plugin://data-builders/query-builder/docs
      mimeType: text/markdown
      description: Query builder documentation
    - uri: plugin://data-builders/report-builder/docs
      mimeType: text/markdown
      description: Report builder documentation
  
  systemPrompt: You are an assistant helping developers use the data builders plugin suite (pivot tables, filters, queries, reports) for UX3 Framework.
