name: "@ux3/plugin-browser"
displayName: Browser
author: UX3 Team
categories:
  - utility
ux3PeerVersion: ^0.2.0
mcp:
  tools:
    - name: browser.info
      description: Get information about browser plugin
      inputSchema:
        type: object
        additionalProperties: false
  resources:
    - uri: plugin://browser/docs
      mimeType: text/markdown
      description: browser plugin documentation
  systemPrompt: You are an assistant helping developers use the browser plugin for
    UX3 Framework.
