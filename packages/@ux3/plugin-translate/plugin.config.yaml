name: "@ux3/plugin-translate"
displayName: Translate
author: UX3 Team
categories:
  - utility
ux3PeerVersion: ^0.2.0
mcp:
  tools:
    - name: translate.info
      description: Get information about translate plugin
      inputSchema:
        type: object
        additionalProperties: false
  resources:
