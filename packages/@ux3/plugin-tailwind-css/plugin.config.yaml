name: "@ux3/plugin-tailwind-css"
displayName: Tailwind Css
author: UX3 Team
categories:
  - utility
ux3PeerVersion: ^0.2.0
mcp:
  tools:
    - name: tailwind_css.info
      description: Get information about tailwind-css plugin
      inputSchema:
        type: object
        additionalProperties: false
  resources:
    - uri: plugin://tailwind-css/docs
      mimeType: text/markdown
      description: tailwind-css plugin documentation
  systemPrompt: You are an assistant helping developers use the tailwind-css
    plugin for UX3 Framework.
