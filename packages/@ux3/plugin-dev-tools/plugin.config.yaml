name: "@ux3/plugin-dev-tools"
displayName: Dev Tools
author: UX3 Team
categories:
  - utility
ux3PeerVersion: ^0.2.0
mcp:
  tools:
    - name: dev_tools.info
      description: Get information about dev-tools plugin
      inputSchema:
        type: object
        additionalProperties: false
  resources:
