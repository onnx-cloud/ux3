name: "@ux3/ux-google-fonts"
displayName: Google Fonts
author: UX3 Team
categories:
  - utility
ux3PeerVersion: ^0.2.0
mcp:
  tools:
    - name: google_fonts.info
      description: Get information about google-fonts plugin
      inputSchema:
        type: object
        additionalProperties: false
  resources:
    - uri: plugin://google-fonts/docs
      mimeType: text/markdown
      description: google-fonts plugin documentation
  systemPrompt: You are an assistant helping developers use the google-fonts
    plugin for UX3 Framework.
