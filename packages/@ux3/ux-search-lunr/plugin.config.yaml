name: "@ux3/ux-search-lunr"
displayName: Search Lunr
author: UX3 Team
categories:
  - utility
ux3PeerVersion: ^0.2.0
mcp:
  tools:
    - name: search_lunr.info
      description: Get information about search-lunr plugin
      inputSchema:
        type: object
