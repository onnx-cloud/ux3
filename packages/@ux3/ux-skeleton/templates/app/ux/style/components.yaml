# UX3 built-in component styles
#
# These are the default style class strings for all built-in ux-* components.
# Override any key here by changing its base value.  App-specific style keys
# (e.g. layout keys used in your own templates) can be added to any file
# under ux/style/.
#
# Values are Tailwind utility strings — add @ux3/ux-tailwind-css (CDN) or
# @ux3/ux-tailwind-plus (purge-based build) in your ux/ux3.yaml plugins.

# ── Layout & Shell ────────────────────────────────────────────────────────────
app-shell:
  base: "min-h-screen flex flex-col"

topbar:
  base: "flex items-center justify-between px-4 py-3 bg-white border-b border-slate-200"

sidebar:
  base: "flex flex-col w-64 bg-white border-r border-slate-200 min-h-screen"

content:
  base: "flex-1 p-4"

breadcrumb:
  base: "flex items-center gap-2 text-sm text-slate-500"

stack:
  base: "flex flex-col gap-4"

inline:
  base: "flex items-center gap-2 flex-wrap"

grid:
  base: "grid gap-4"

hero:
  base: "py-16 px-4 text-center"

article:
  base: "prose max-w-prose"

divider:
  base: "border-t border-slate-200 my-4"

# ── Navigation ────────────────────────────────────────────────────────────────
nav:
  base: "flex items-center gap-4"

header:
  base: "flex items-center justify-between px-6 py-4 bg-white border-b border-slate-200"

footer:
  base: "px-6 py-4 text-sm text-slate-500 border-t border-slate-100"

# ── Feedback & Status ─────────────────────────────────────────────────────────
alert:
  base: "p-4 rounded-md border-l-4 bg-blue-50 border-blue-400 text-blue-800"

spinner:
  base: "animate-spin inline-block h-6 w-6 border-2 border-t-transparent rounded-full border-blue-500"

skeleton:
  base: "animate-pulse bg-slate-200 rounded"

progress:
  base: "w-full bg-slate-100 rounded-full h-2"

empty-state:
  base: "flex flex-col items-center justify-center gap-3 py-12 text-slate-400"

error-panel:
  base: "p-4 rounded-md bg-red-50 border border-red-200 text-red-700"

badge:
  base: "inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-700"

# ── Data Display ──────────────────────────────────────────────────────────────
card:
  base: "bg-white rounded-lg border border-slate-200 shadow-sm p-4"

table:
  base: "w-full text-sm border-collapse"

list:
  base: "divide-y divide-slate-100"

avatar:
  base: "inline-flex items-center justify-center w-9 h-9 rounded-full bg-slate-200 text-slate-600 font-medium text-sm"

# ── Overlays ──────────────────────────────────────────────────────────────────
modal:
  base: "fixed inset-0 z-50 flex items-center justify-center bg-black/40"

drawer:
  base: "fixed inset-y-0 right-0 z-50 w-80 bg-white shadow-xl"

tooltip:
  base: "absolute z-50 px-2 py-1 text-xs text-white bg-slate-800 rounded shadow-lg"

popover:
  base: "absolute z-40 bg-white border border-slate-200 rounded-lg shadow-lg p-3"

# ── Navigation patterns ───────────────────────────────────────────────────────
tabs:
  base: "flex gap-1 border-b border-slate-200"

menu:
  base: "flex flex-col gap-0.5 py-1"

# ── Forms ─────────────────────────────────────────────────────────────────────
form:
  base: "flex flex-col gap-4"

input:
  base: "w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"

textarea:
  base: "w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y"

select:
  base: "w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"

checkbox:
  base: "h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500"

radio-group:
  base: "flex flex-col gap-2"

switch:
  base: "relative inline-flex h-5 w-9 items-center rounded-full bg-slate-200"

slider:
  base: "w-full h-2 rounded-full bg-slate-200 accent-blue-500"

form-errors:
  base: "flex flex-col gap-1 text-sm text-red-600"

# ── Buttons ───────────────────────────────────────────────────────────────────
button:
  base: "inline-flex items-center justify-center px-4 py-2 rounded-md font-medium text-sm transition-colors bg-blue-600 text-white hover:bg-blue-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500"

icon-button:
  base: "inline-flex items-center justify-center w-8 h-8 rounded-md hover:bg-slate-100 transition-colors"

# ── Search ────────────────────────────────────────────────────────────────────
search-input:
  base: "w-full px-3 py-2 pl-9 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"

search-results:
  base: "absolute z-40 w-full bg-white border border-slate-200 rounded-lg shadow-lg mt-1 max-h-64 overflow-auto"

# ── Pagination ────────────────────────────────────────────────────────────────
pagination:
  base: "flex items-center gap-1"

# ── Rich content ──────────────────────────────────────────────────────────────
wysiwyg:
  base: "prose min-h-[8rem] px-3 py-2 border border-slate-300 rounded-md focus:outline-none"

wizard:
  base: "flex flex-col gap-6"

accordion:
  base: "border border-slate-200 rounded-lg divide-y divide-slate-100"

# ── Consent / legal ───────────────────────────────────────────────────────────
consent-banner:
  base: "fixed bottom-0 inset-x-0 z-50 bg-slate-900 text-white px-6 py-4 flex items-center justify-between gap-4 text-sm"

# ── i18n / theme controls ─────────────────────────────────────────────────────
lang-switcher:
  base: "flex items-center gap-2 text-sm"

locale:
  base: "flex items-center gap-2 text-sm"

theme:
  base: "inline-flex items-center"

# ── Splash / loading screens ──────────────────────────────────────────────────
splash:
  base: "fixed inset-0 flex items-center justify-center bg-white z-50"

splash-screen:
  base: "fixed inset-0 flex items-center justify-center bg-white z-50"
