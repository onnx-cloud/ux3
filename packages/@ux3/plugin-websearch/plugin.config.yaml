name: "@ux3/plugin-websearch"
displayName: "Web Search"
author: UX3 Team
categories:
  - analysis
  - utility
ux3PeerVersion: ^0.2.0

mcp:
  tools:
    - name: websearch.query
      description: Execute a web search query using the configured provider.
      inputSchema:
        type: object
        properties:
          query: { type: string }
          provider: { type: string }
          count:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
          locale: { type: string }
          safeSearch:
            type: string
            enum: [off, moderate, strict]
            default: moderate
          browserHints:
            type: object
            additionalProperties: true
        required: [query]

    - name: websearch.page.fetch
      description: Fetch the final rendered page content for a search result or URL.
      inputSchema:
        type: object
        properties:
          url: { type: string }
          provider: { type: string }
          render:
            type: string
            enum: [text, html, screenshot]
            default: text
          maxChars: { type: integer, default: 2000 }
        required: [url]

    - name: websearch.summarize
      description: Summarize one or more web search results or page contents.
      inputSchema:
        type: object
        properties:
          inputs:
            type: array
            items:
              type: object
              properties:
                url: { type: string }
                content: { type: string }
              required: [url]
          format:
            type: string
            enum: [text, bullets, json]
            default: json
        required: [inputs]

    - name: websearch.queryProviders
      description: List supported search providers and provider-specific configuration options.
      inputSchema:
        type: object
        additionalProperties: false

  resources:
    - uri: plugin://websearch/docs
      mimeType: text/markdown
      description: Web search plugin documentation
    - uri: plugin://websearch/schema
      mimeType: application/json
      description: Web search tool schema definitions
    - uri: plugin://websearch/providers
      mimeType: application/json
      description: Supported web search providers and metadata

  systemPrompt: "You are a web search assistant. Use the registered websearch tools to search the internet, fetch page content, and summarize results. Avoid hallucinations; prefer tool results over guessing."

config:
  provider: brave
  brave:
    endpoint: "https://search.brave.com/api/v1/search"
    apiKeyEnv: "BRAVE_SEARCH_API_KEY"
