name: "@ux3/plugin-gantt"
displayName: Gantt
author: UX3 Team
categories:
  - utility
ux3PeerVersion: ^0.2.0
mcp:
  tools:
    - name: gantt.info
      description: Get information about gantt plugin
      inputSchema:
        type: object
        additionalProperties: false
  resources:
    - uri: plugin://gantt/docs
      mimeType: text/markdown
      description: gantt plugin documentation
  systemPrompt: You are an assistant helping developers use the gantt plugin for
    UX3 Framework.
