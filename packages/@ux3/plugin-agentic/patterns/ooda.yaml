id: ooda
description: "Observe → Orient → Decide → Act loop for sensing and reacting agents."
initial: observe
states:
  observe:
    template: 'prompts/ooda/observe.md'
    invoke:
      src: sample
    on:
      done: orient
      error: "#error"
  orient:
    template: 'prompts/ooda/orient.md'
    invoke:
      src: sample
    on:
      done: decide
      error: "#error"
  decide:
    template: 'prompts/ooda/decide.md'
    invoke:
      src: sample
    on:
      done: act
      error: "#error"
  act:
    template: 'prompts/ooda/act.md'
    invoke:
      src: executeTool
      maxRetries: 1
    on:
      done: observe
      error: "#error"
  done:
    type: final
