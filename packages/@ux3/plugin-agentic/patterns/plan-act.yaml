id: plan-act
description: "Plan before execution: decompose the task, execute each step, synthesize results."
initial: plan
states:
  plan:
    template: 'prompts/plan-act/plan.md'
    invoke:
      src: sample
    on:
      done: act
      error: "#error"
  act:
    template: 'prompts/plan-act/act.md'
    invoke:
      src: executeTool
      maxRetries: 1
    on:
      done: observe
      error: "#error"
  observe:
    template: 'prompts/plan-act/observe.md'
    invoke:
      src: sample
    on:
      DONE: synthesize
      NEXT: act
  synthesize:
    template: 'prompts/plan-act/synthesize.md'
    invoke:
      src: sample
    on:
      done: done
  done:
    type: final
