id: critic
description: "Generate → Critique → Revise → Finalize loop for output quality improvement."
initial: generate
states:
  generate:
    template: 'prompts/critic/generate.md'
    invoke:
      src: sample
    on:
      done: critique
      error: "#error"
  critique:
    template: 'prompts/critic/critique.md'
    invoke:
      src: sample
    on:
      ACCEPT: finalize
      REVISE: revise
      error: "#error"
  revise:
    template: 'prompts/critic/revise.md'
    invoke:
      src: sample
    on:
      done: critique
      error: "#error"
  finalize:
    template: 'prompts/critic/finalize.md'
    invoke:
      src: sample
    on:
      done: done
  done:
    type: final
