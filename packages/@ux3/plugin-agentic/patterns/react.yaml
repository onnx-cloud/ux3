id: react
description: "Reasoning + Acting loop: think about what to do, act via tools, observe results, repeat."
initial: think
states:
  think:
    template: 'prompts/react/think.md'
    invoke:
      src: sample
    on:
      RESPOND: done
      ACT: act
      CONTINUE: think
  act:
    template: 'prompts/react/act.md'
    invoke:
      src: executeTool
      maxRetries: 1
    on:
      done: observe
      error: "#error"
  observe:
    template: 'prompts/react/observe.md'
    invoke:
      src: sample
    on:
      DONE: done
      CONTINUE: think
  done:
    type: final
