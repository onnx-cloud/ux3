id: chain-of-thought
description: "Step-by-step reasoning pattern: reason through the problem, then respond."
initial: reason
states:
  reason:
    template: 'prompts/chain-of-thought/reason.md'
    invoke:
      src: sample
    on:
      RESPOND: respond
      CONTINUE: reason
  respond:
    template: 'prompts/chain-of-thought/respond.md'
    invoke:
      src: sample
    on:
      done: done
  done:
    type: final
