name: "@ux3/plugin-i18n"
displayName: I18n
author: UX3 Team
categories:
  - utility
ux3PeerVersion: ^0.2.0
mcp:
  tools:
    - name: i18n.info
      description: Get information about i18n plugin
      inputSchema:
        type: object
        additionalProperties: false
  resources:
    - uri: plugin://i18n/docs
      mimeType: text/markdown
      description: i18n plugin documentation
  systemPrompt: You are an assistant helping developers use the i18n plugin for
    UX3 Framework.
