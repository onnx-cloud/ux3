<!-- Launcher icon state: sticky circular avatar that opens drawer -->
<template data-state="idle">
  <button
    class="ux-style-chat-launcher-btn"
    aria-label="{{ i18n 'chat.launcher.ariaLabel' }}"
    data-action="CLICK"
    title="{{ i18n 'chat.launcher.title' }}">
    <svg class="ux-style-chat-launcher-icon" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
    </svg>
    {{#if context.unreadCount}}
      <span class="ux-style-chat-launcher-badge" aria-label="{{ i18n 'chat.launcher.unreadBadge' context.unreadCount }}">
        {{context.unreadCount}}
      </span>
    {{/if}}
  </button>
</template>

<!-- Opening state: loading indicator -->
<template data-state="opening">
  <div class="ux-style-chat-drawer-wrapper">
    <div class="ux-style-chat-drawer" role="region" aria-label="{{ i18n 'chat.drawer.title' }}">
      <div class="ux-style-chat-drawer-header">
        <h2 class="ux-style-chat-drawer-heading">{{ i18n 'chat.drawer.title' }}</h2>
        <button class="ux-style-chat-drawer-close" data-action="CLOSE" aria-label="{{ i18n 'chat.drawer.close' }}">✕</button>
      </div>
      <div class="ux-style-chat-loading" role="status" aria-live="polite">
        <div class="ux-style-spinner"></div>
        <p>{{ i18n 'chat.loading' }}</p>
      </div>
    </div>
  </div>
</template>

<!-- Open state: message history + composer -->
<template data-state="open">
  <div class="ux-style-chat-drawer-wrapper">
    <div class="ux-style-chat-drawer" role="region" aria-label="{{ i18n 'chat.drawer.title' }}">
      <!-- Header -->
      <div class="ux-style-chat-drawer-header">
        <h2 class="ux-style-chat-drawer-heading">{{ i18n 'chat.drawer.title' }}</h2>
        <button class="ux-style-chat-drawer-close" data-action="CLOSE" aria-label="{{ i18n 'chat.drawer.close' }}">✕</button>
      </div>

      <!-- Message history -->
      <div class="ux-style-chat-history" role="log" aria-live="polite" aria-label="{{ i18n 'chat.history.ariaLabel' }}">
        {{#each context.history}}
          <div class="ux-style-chat-message" data-message-id="{{this.id}}" data-role="{{this.role}}">
            <img src="{{this.sender.avatar}}" alt="" class="ux-style-chat-avatar" />
            <div class="ux-style-chat-bubble">
              <div class="ux-style-chat-sender-info">
                <strong class="ux-style-chat-sender-name">{{this.sender.name}}</strong>
                <time datetime="{{this.timestamp}}" class="ux-style-chat-timestamp">{{formatTime this.timestamp}}</time>
              </div>
              <!-- Render content blocks -->
              {{#each this.content}}
                {{#if (eq this.type 'text')}}
                  <div class="ux-style-chat-content-text">
                    {{markdown this.text}}
                  </div>
                {{else if (eq this.type 'image')}}
                  <img src="{{this.url}}" alt="" class="ux-style-chat-content-image" />
                {{/if}}
              {{/each}}
              <!-- Message status -->
              <span class="ux-style-chat-status" data-status="{{this.status}}" aria-label="{{ i18n (concat 'chat.message.status.' this.status) }}"></span>
            </div>
          </div>
        {{/each}}
      </div>

      <!-- Composer -->
      <form class="ux-style-chat-composer" role="form" novalidate>
        <textarea
          class="ux-style-chat-input"
          aria-label="{{ i18n 'chat.composer.inputLabel' }}"
          placeholder="{{ i18n 'chat.composer.placeholder' }}"
          data-action="INPUT_CHANGE"
          data-action-value="value"
          required></textarea>
        <button
          type="submit"
          class="ux-style-chat-send-btn"
          aria-label="{{ i18n 'chat.composer.sendButton' }}"
          data-action="SEND"
          {{#unless context.inputText}}disabled{{/unless}}>
          {{ i18n 'chat.composer.sendButton' }}
        </button>
      </form>
    </div>
  </div>
</template>

<!-- Error state -->
<template data-state="error">
  <div class="ux-style-chat-drawer-wrapper">
    <div class="ux-style-chat-drawer" role="region" aria-label="{{ i18n 'chat.drawer.title' }}">
      <div class="ux-style-chat-drawer-header">
        <h2 class="ux-style-chat-drawer-heading">{{ i18n 'chat.drawer.title' }}</h2>
        <button class="ux-style-chat-drawer-close" data-action="CLOSE" aria-label="{{ i18n 'chat.drawer.close' }}">✕</button>
      </div>
      <div class="ux-style-chat-error" role="alert">
        <p class="ux-style-chat-error-message">
          {{ i18n 'chat.error.message' }}
          {{#if context.error}}<br><code>{{context.error}}</code>{{/if}}
        </p>
        <div class="ux-style-chat-error-actions">
          <button class="ux-style-chat-error-retry" data-action="RETRY">
            {{ i18n 'chat.error.retry' }}
          </button>
          <button class="ux-style-chat-error-close" data-action="CLOSE">
            {{ i18n 'chat.error.close' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</template>
